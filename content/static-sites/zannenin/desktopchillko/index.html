<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="残念院ちる子のデスクトップアクセサリ紹介ページ。ちる子ちゃんがPC画面のすみにやってくる、ちいさくてかわいいデスクトップマスコットです。">
    <title>デスクトップちる子 | 残念院ちる子</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page-shell">
      <section class="hero" aria-labelledby="hero-title">
        <div class="hero-copy">
          <p class="tiny-label">Desktop Accessory</p>
          <h1 id="hero-title">
            <span>デスクトップに、</span>
            <span>ちる子ちゃんを。</span>
          </h1>
          <p class="lead">
            作業中も、休憩中も、PCのすみにちょこん。
            残念院ちる子のちいさなデスクトップアクセサリです。
          </p>
        </div>

        <div class="hero-art" aria-label="デスクトップちる子のイメージ">
          <div class="soft-window">
            <img src="assets/desktop-chiruko-booth.png" alt="デスクトップちる子の紹介ビジュアル">
          </div>
          <img class="chillko-float" src="assets/chiruko-stand-sitting.png" alt="座っている残念院ちる子のミニキャラ">
        </div>
      </section>

      <section class="mood-section" aria-labelledby="mood-title">
        <div class="section-title">
          <p class="tiny-label">Mood</p>
          <h2 id="mood-title">PC時間に、ちいさな表情を。</h2>
        </div>
        <div class="mood-grid">
          <article class="mood-card">
            <img src="assets/chiruko-startup.png" alt="起動時のデスクトップちる子">
            <h3>おはよう</h3>
            <p>起動したら、まずはちる子ちゃんがお出迎え。</p>
          </article>
          <article class="mood-card">
            <img src="assets/chiruko-game.png" alt="ミニゲーム中のデスクトップちる子">
            <h3>あそぶ</h3>
            <p>ちょっとした息抜きも、デスクトップの上で。</p>
          </article>
          <article class="mood-card">
            <img src="assets/chiruko-music.png" alt="音楽再生中のデスクトップちる子">
            <h3>くつろぐ</h3>
            <p>音楽を流しながら、ふんわり休憩モード。</p>
          </article>
        </div>
      </section>

      <section class="standee-section" aria-labelledby="standee-title">
        <div class="standee-copy">
          <p class="tiny-label">Chillko</p>
          <h2 id="standee-title">いろんなちる子ちゃん。</h2>
          <p>
            読む、走る、眠る、待つ。
            デスクトップの片隅で、ちる子ちゃんが気ままに過ごします。
          </p>
        </div>
        <div class="standee-stage">
          <img src="assets/chiruko-stand-reading.png" alt="本を読んでいる残念院ちる子">
          <img src="assets/chiruko-stand-running.png" alt="走っている残念院ちる子">
          <img src="assets/chiruko-stand-sleeping.png" alt="眠っている残念院ちる子">
          <img src="assets/chiruko-stand-sitting.png" alt="座っている残念院ちる子">
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <span>Desktop Chillko</span>
      <a href="../">残念院さん公式ページへ</a>
    </footer>
  </body>
</html>
